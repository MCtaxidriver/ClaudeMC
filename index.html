<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>ClaudeMC WebSocket Test</title>
</head>
<body>
  <h1>WebSocket Verbindungstest</h1>
  <button id="testBtn">Verbindung testen</button>
  <br /><br />
  <input id="result" type="text" size="50" readonly placeholder="Antwort erscheint hier..." />

  <script>
    document.getElementById('testBtn').addEventListener('click', () => {
      const resultField = document.getElementById('result');
      resultField.value = 'Verbinde...';

      const ws = new WebSocket('wss://claudemc.onrender.com');

      ws.onopen = () => {
        ws.send('Ping');
      };

      ws.onmessage = (event) => {
        resultField.value = event.data;
        ws.close();
      };

      ws.onerror = () => {
        resultField.value = 'Fehler bei der Verbindung';
      };

      ws.onclose = () => {
        if (resultField.value === 'Verbinde...') {
          resultField.value = 'Verbindung geschlossen ohne Antwort';
        }
      };
    });
  </script>
</body>
</html>
